<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音乐人合作关系图谱</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>音乐人合作关系图谱</h1>
        <p id="dataset-scope">加载数据中...</p>
      </div>
      <div class="toolbar">
        <label>
          数据集
          <select id="dataset-select"></select>
        </label>
        <label>
          图谱模式
          <select id="view-mode">
            <option value="artist">歌手中心图</option>
            <option value="song">歌曲桥接图</option>
            <option value="bridge">跨歌手交集</option>
          </select>
        </label>
        <label>
          边模式
          <select id="edge-mode">
            <option value="typed">区分职能</option>
            <option value="merged">合并职能</option>
          </select>
        </label>
        <label>
          方向
          <select id="direction-mode">
            <option value="directed">有向</option>
            <option value="undirected">无向</option>
          </select>
        </label>
        <label>
          最小歌曲数
          <input id="min-count" type="number" min="1" value="1" />
        </label>
      </div>
    </header>

    <main class="layout">
      <section class="summary-strip" id="summary-strip"></section>

      <section class="workspace">
        <div class="graph-panel">
          <div class="panel-head">
            <div>
              <h2 id="graph-title">图谱</h2>
              <p id="graph-note"></p>
            </div>
            <input id="search-input" type="search" placeholder="搜索音乐人或歌曲" />
          </div>
          <svg id="graph" role="img" aria-label="音乐人合作关系图谱"></svg>
        </div>

        <aside class="detail-panel">
          <h2>详情</h2>
          <div id="detail-content" class="detail-content"></div>
        </aside>
      </section>

      <section class="data-section">
        <div class="tabs">
          <button class="tab active" data-tab="songs">歌曲明细</button>
          <button class="tab" data-tab="edges">关系明细</button>
          <button class="tab" data-tab="quality">数据质量</button>
        </div>
        <div id="table-content"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
