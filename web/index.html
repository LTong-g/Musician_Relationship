<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音乐人合作关系图谱</title>
    <link rel="stylesheet" href="styles.css?v=20260512-native-select-overlay" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>音乐人合作关系图谱</h1>
        <p id="dataset-scope">加载数据中...</p>
      </div>
      <div class="toolbar">
        <div class="target-filter">
          <span class="control-label">目标歌手</span>
          <div class="target-select-shell">
            <select id="target-visual-select" class="target-visual-select" aria-hidden="true" tabindex="-1">
              <option>全部目标歌手</option>
            </select>
            <button id="target-dropdown-toggle" class="target-dropdown-toggle" type="button" aria-haspopup="true" aria-expanded="false">
              <span id="target-dropdown-label" class="target-dropdown-label">全部目标歌手</span>
            </button>
          </div>
          <div id="target-dropdown-menu" class="target-dropdown-menu" hidden>
            <input id="target-filter-search" class="target-filter-search" type="search" placeholder="搜索目标歌手" />
            <div class="target-actions">
              <button id="target-select-all" type="button">全选</button>
              <button id="target-invert" type="button">反选</button>
            </div>
            <div id="target-checkboxes" class="target-checkboxes"></div>
          </div>
        </div>
        <label>
          视图
          <select id="view-mode">
            <option value="artist">贡献者网络</option>
            <option value="bridge">共同合作者</option>
          </select>
        </label>
        <label>
          职能显示
          <select id="role-display">
            <option value="split">作词/作曲分开</option>
            <option value="merged">不区分职能</option>
          </select>
        </label>
        <label class="switch-control">
          粒子效果
          <input id="particle-toggle" type="checkbox" checked />
          <span class="switch-track" aria-hidden="true"></span>
        </label>
        <label>
          显示阈值
          <input id="min-count" type="number" min="1" value="1" />
        </label>
      </div>
    </header>

    <main class="layout">
      <section class="workspace">
        <div class="graph-panel">
          <div class="panel-head">
            <div>
              <h2 id="graph-title">图谱</h2>
              <p id="graph-note"></p>
            </div>
            <input id="search-input" type="search" placeholder="搜索音乐人或歌曲" />
          </div>
          <div id="graph" role="img" aria-label="音乐人合作关系图谱"></div>
        </div>

        <aside class="detail-panel">
          <h2>详情</h2>
          <div id="detail-content" class="detail-content"></div>
        </aside>
      </section>

      <section class="data-section">
        <div class="tabs">
          <button class="tab active" data-tab="songs">歌曲明细</button>
          <button class="tab" data-tab="edges">关系明细</button>
        </div>
        <div id="table-content"></div>
      </section>
    </main>

    <script src="vendor/force-graph.min.js"></script>
    <script src="app.js?v=20260512-native-select-overlay"></script>
  </body>
</html>
