<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>音乐人合作关系图谱</title>
    <link rel="stylesheet" href="styles.css?v=20260511-soft-edge" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>音乐人合作关系图谱</h1>
        <p id="dataset-scope">加载数据中...</p>
      </div>
      <div class="toolbar">
        <div class="source-pill">
          <span>数据集</span>
          <strong id="source-name">QQ 音乐</strong>
        </div>
        <label>
          目标歌手
          <select id="target-select"></select>
        </label>
        <label>
          视图
          <select id="view-mode">
            <option value="artist">贡献者网络</option>
            <option value="bridge">共同合作者</option>
          </select>
        </label>
        <label>
          职能显示
          <select id="role-display">
            <option value="split">作词/作曲分开</option>
            <option value="merged">合并为合作次数</option>
          </select>
        </label>
        <label>
          连线方向
          <select id="direction-mode">
            <option value="directed">有向</option>
            <option value="undirected">无向</option>
          </select>
        </label>
        <label>
          最小歌曲数
          <input id="min-count" type="number" min="1" value="2" />
        </label>
      </div>
    </header>

    <main class="layout">
      <section class="source-band">
        <div>
          <span>当前数据源</span>
          <strong id="source-description">由 QQ 音乐元数据离线采集生成的静态关系图谱数据。</strong>
        </div>
        <div>
          <span>范围切换</span>
          <strong>目标歌手只是筛选范围，不是独立数据集。</strong>
        </div>
      </section>

      <section class="summary-strip" id="summary-strip"></section>

      <section class="workspace">
        <div class="graph-panel">
          <div class="panel-head">
            <div>
              <h2 id="graph-title">图谱</h2>
              <p id="graph-note"></p>
            </div>
            <input id="search-input" type="search" placeholder="搜索音乐人或歌曲" />
          </div>
          <svg id="graph" role="img" aria-label="音乐人合作关系图谱"></svg>
        </div>

        <aside class="detail-panel">
          <h2>详情</h2>
          <div id="detail-content" class="detail-content"></div>
        </aside>
      </section>

      <section class="data-section">
        <div class="tabs">
          <button class="tab active" data-tab="songs">歌曲明细</button>
          <button class="tab" data-tab="edges">关系明细</button>
          <button class="tab" data-tab="quality">数据质量</button>
        </div>
        <div id="table-content"></div>
      </section>
    </main>

    <script src="app.js?v=20260511-soft-edge"></script>
  </body>
</html>
